name: Build Docker Image
on:
  workflow_call:


jobs:
     # Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Build Docker Image
      run: |
        docker build -t python-fastapi:${{ github.sha }} .
