name: Build Docker Image
on:
  workflow_call:


jobs:
     # Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Build Docker Image
      run: |
        docker build -t python-fastapi:${{ github.sha }} .
