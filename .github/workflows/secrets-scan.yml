name: Secret Scanning

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write
  issues: write

concurrency:
  group: secret-scanning-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Detect committed secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        shell: bash
        run: |
          set +e

          scan_scope="repository history"
          log_opts=()

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            scan_scope="pull request commits"
            log_opts=(
              "--log-opts=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
            )
          fi

          echo "scan_scope=${scan_scope}" >> "${GITHUB_OUTPUT}"

          docker run \
            --rm \
            --volume "${PWD}:/repo" \
            --workdir /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.0 \
            detect \
            --source=. \
            "${log_opts[@]}" \
            --redact \
            --report-format=sarif \
            --report-path=gitleaks-results.sarif \
            --exit-code=1 \
            --verbose

          exit_code="$?"
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks-secrets

      - name: Upload Gitleaks report artifact
        if: always() && hashFiles('gitleaks-results.sarif') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gitleaks-sarif-${{ github.sha }}
          path: gitleaks-results.sarif
          retention-days: 30
          if-no-files-found: error

      - name: Write secret scanning summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.gitleaks.outputs.exit_code }}" = "0" ]; then
            result="passed"
            detail="No committed secrets were detected."
          else
            result="failed"
            detail="Gitleaks detected one or more committed secrets. Review the SARIF report and rotate any exposed credential before merging."
          fi

          {
            echo "## Secret Scanning"
            echo
            echo "| Scanner | Scope | Result |"
            echo "|---|---|---|"
            echo "| Gitleaks v8.30.0 | ${{ steps.gitleaks.outputs.scan_scope }} | ${result} |"
            echo
            echo "${detail}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment secret scan result on pull request
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          GITLEAKS_EXIT_CODE: ${{ steps.gitleaks.outputs.exit_code }}
          GITLEAKS_SCOPE: ${{ steps.gitleaks.outputs.scan_scope }}
        shell: bash
        run: |
          set -euo pipefail

          marker="<!-- operation-aegis-secret-scan -->"
          comment_file="${RUNNER_TEMP}/secret-scan-comment.md"

          if [ "${GITLEAKS_EXIT_CODE}" = "0" ]; then
            status="passed"
            next_step="No action required."
          else
            status="failed"
            next_step="Review the uploaded Gitleaks SARIF artifact, remove the secret, and rotate the exposed credential before merge."
          fi

          {
            echo "${marker}"
            echo "## Operation Aegis secret scan"
            echo
            echo "| Scanner | Scope | Status |"
            echo "|---|---|---|"
            echo "| Gitleaks v8.30.0 | ${GITLEAKS_SCOPE} | ${status} |"
            echo
            echo "${next_step}"
          } > "${comment_file}"

          comment_id="$(
            gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.user.type == "Bot" and (.body | contains("<!-- operation-aegis-secret-scan -->"))) | .id' \
              | head -n 1
          )"

          if [ -n "${comment_id}" ]; then
            gh api \
              --method PATCH \
              "repos/${REPOSITORY}/issues/comments/${comment_id}" \
              -f body="$(cat "${comment_file}")"
          else
            gh api \
              --method POST \
              "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -f body="$(cat "${comment_file}")"
          fi

      - name: Enforce secret scanning gate
        if: steps.gitleaks.outputs.exit_code != '0'
        run: |
          echo "::error::Gitleaks detected committed secrets"
          exit 1
