name: Unit and Security Scanning

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  unit_test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install --requirement requirements-dev.txt

      - name: Run tests
        env:
          API_TOKEN: ci-test-token-ci-test-token-1234
          APP_ENV: test
        run: |
          set -euo pipefail

          python -m pytest -v

  trivy_scans:
    name: Scan container image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Docker image
        run: |
          set -euo pipefail

          docker build \
            --tag "python-fastapi:${{ github.sha }}" \
            .

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: "python-fastapi:${{ github.sha }}"
          scanners: vuln
          vuln-type: os,library
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-image

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: "python-fastapi:${{ github.sha }}"
          scanners: vuln
          format: cyclonedx
          output: sbom.cdx.json
          exit-code: "0"
          skip-setup-trivy: true

      - name: Upload SBOM artifact
        if: always() && hashFiles('sbom.cdx.json') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 30
          if-no-files-found: error

      - name: Enforce vulnerability gate
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: "python-fastapi:${{ github.sha }}"
          scanners: vuln
          vuln-type: os,library
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          skip-setup-trivy: true

  owasp_zap_scan:
    name: Run OWASP ZAP API scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate ephemeral API token
        shell: bash
        run: |
          set -euo pipefail

          TOKEN="$(openssl rand -hex 32)"

          echo "::add-mask::${TOKEN}"

          {
            echo "API_TOKEN=${TOKEN}"
            echo "ZAP_AUTH_HEADER=Authorization"
            echo "ZAP_AUTH_HEADER_VALUE=Bearer ${TOKEN}"
            echo "ZAP_AUTH_HEADER_SITE=127.0.0.1"
          } >> "${GITHUB_ENV}"

      - name: Build Docker image
        run: |
          set -euo pipefail

          docker build \
            --tag "python-fastapi:${{ github.sha }}" \
            .

      - name: Start application container
        run: |
          set -euo pipefail

          docker run \
            --detach \
            --name operation-aegis-ci \
            --env API_TOKEN \
            --env APP_ENV=test \
            --env DOCS_ENABLED=true \
            --env DATABASE_PATH=/tmp/aegis.db \
            --env UPLOAD_DIRECTORY=/tmp/uploads \
            --publish 127.0.0.1:8080:8080 \
            "python-fastapi:${{ github.sha }}"

      - name: Wait for application readiness
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            echo "Readiness attempt ${attempt}/30"

            if curl \
              --fail \
              --silent \
              --show-error \
              --connect-timeout 2 \
              --max-time 5 \
              http://127.0.0.1:8080/health \
              > /dev/null
            then
              if curl \
                --fail \
                --silent \
                --show-error \
                --connect-timeout 2 \
                --max-time 5 \
                http://127.0.0.1:8080/openapi.json \
                --output /tmp/openapi.json
              then
                python3 -m json.tool \
                  /tmp/openapi.json \
                  > /dev/null

                echo "Application and OpenAPI schema are ready"
                exit 0
              fi
            fi

            sleep 2
          done

          echo "::error::Application did not become ready"

          echo "=== Docker containers ==="
          docker ps -a

          echo "=== Application logs ==="
          docker logs operation-aegis-ci || true

          exit 1

      - name: Confirm application endpoints
        run: |
          set -euo pipefail

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8080/health

          echo

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8080/openapi.json \
            > /dev/null

      - name: Run ZAP API scan
        uses: zaproxy/action-api-scan@77dfa9a647bb0f583e39d4df8531634d6ddd8df4
        with:
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          format: openapi
          target: http://127.0.0.1:8080/openapi.json
          rules_file_name: .zap/rules.tsv
          cmd_options: -a
          allow_issue_writing: false
          fail_action: true
          artifact_name: zap-api-scan

      - name: Show application logs
        if: always()
        run: |
          echo "=== Application logs ==="
          docker logs operation-aegis-ci || true

      - name: Stop application container
        if: always()
        run: |
          docker rm \
            --force \
            operation-aegis-ci \
            2>/dev/null || true

  dependency_audit:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install pip-audit
        run: |
          set -euo pipefail

          python -m pip install \
            --require-hashes \
            --no-deps \
            --requirement requirements-dev.txt

      - name: Audit production dependencies
        run: |
          set -euo pipefail

          python -m pip_audit \
            --requirement requirements.txt \
            --strict
