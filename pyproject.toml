[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    ".git",
    ".venv",
    "data",
    "htmlcov",
    "reports",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
    "B",
    "UP",
    "S",
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",
    "S105",
    "S106",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
skip-magic-trailing-comma = false
docstring-code-format = true

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
addopts = [
    "-ra",
    "--strict-config",
    "--strict-markers",
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=xml",
    "--cov-fail-under=80",
]

[tool.coverage.run]
branch = true
source = [
    "app",
]
omit = [
    "app/main.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = true

[tool.coverage.xml]
output = "coverage.xml"
